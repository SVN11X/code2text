<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code2Text Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
        .container { border: 2px dashed #ccc; padding: 2rem; text-align: center; border-radius: 10px; }
        #status { margin-top: 1rem; color: #555; font-size: 0.9rem; white-space: pre-wrap; text-align: left; }
        button { background: #2ea44f; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <h2>Code2Text Converter</h2>
    <p>Sube un archivo .zip para consolidar tu código en un solo .txt optimizado para LLMs.</p>

    <div class="container">
        <input type="file" id="fileInput" accept=".zip">
        <br><br>
        <button id="processBtn" disabled>Procesar y Descargar</button>
    </div>

    <div id="status"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');

        // Configuración idéntica a tu notebook
        const ALLOWED_EXTENSIONS = [".py", ".xml", ".yaml", ".yml", ".xacro", ".cpp", ".cc", ".h", ".hpp", ".ino", ".msg", ".srv", ".action", ".urdf", ".world", ".sh", ".cfg", ".toml", ".txt", ".md"];
        const EXCLUDE_DIRS = ["__pycache__", ".git", ".venv", "node_modules", "z_code_file"];

        fileInput.addEventListener('change', () => {
            processBtn.disabled = !fileInput.files.length;
        });

        async function processZip() {
            const file = fileInput.files[0];
            if (!file) return;

            status.textContent = "Leyendo archivo zip...";
            const zip = new JSZip();
            const contents = await zip.loadAsync(file);
            
            let treeOutput = "src/\n";
            let codeOutput = "<documentos_codigo>\n";
            let fileCount = 0;

            // 1. Generar estructura y procesar archivos
            for (const [path, zipEntry] of Object.entries(contents.files)) {
                if (zipEntry.dir) continue;

                // Filtrar carpetas excluidas
                const pathParts = path.split('/');
                if (pathParts.some(part => EXCLUDE_DIRS.includes(part))) continue;

                const ext = "." + path.split('.').pop().toLowerCase();
                
                // Agregar al árbol visual
                treeOutput += `  ├─ ${path}\n`;

                // Si es un archivo de código permitido, procesarlo
                if (ALLOWED_EXTENSIONS.includes(ext)) {
                    let text = await zipEntry.async("string");
                    const cleanText = limpiarCodigo(text, ext);

                    if (cleanText.trim()) {
                        codeOutput += `  <archivo ruta="${path}" tipo="${ext}">\n`;
                        codeOutput += cleanText;
                        codeOutput += `\n  </archivo>\n`;
                        fileCount++;
                    }
                }
            }

            codeOutput += "</documentos_codigo>";

            // 2. Consolidar resultado final siguiendo tu formato
            const finalResult = `<estructura_proyecto>\n${treeOutput}</estructura_proyecto>\n\n${codeOutput}`;

            // 3. Descargar
            downloadFile(finalResult, "000_output_full_code.txt");
            status.textContent = `¡Listo! Procesados ${fileCount} archivos.`;
        }

        function limpiarCodigo(texto, extension) {
            // Replicamos la lógica de tu notebook mediante Regex
            
            // Python: comentarios # y docstrings
            if (extension === ".py") {
                texto = texto.replace(/^\s*#.*$/gm, ""); // Líneas de comentarios
                texto = texto.replace(/"""[\s\S]*?"""|'''[\s\S]*?'''/g, ""); // Docstrings
                texto = texto.replace(/(?<!["'])#[^"'\n]*$/gm, ""); // Comentarios al final de línea
            }
            // C++/Arduino/Java: // y /* */
            else if ([".cpp", ".cc", ".h", ".hpp", ".ino"].includes(extension)) {
                texto = texto.replace(/\/\/.*$/gm, "");
                texto = texto.replace(/\/\*[\s\S]*?\*\//g, "");
            }
            // XML/XACRO/URDF: else if ([".xml", ".xacro", ".urdf", ".world"].includes(extension)) {
                texto = texto.replace(//g, "");
            }
            // YAML/TOML/SH: comentarios #
            else if ([".yaml", ".yml", ".sh", ".toml", ".cfg"].includes(extension)) {
                texto = texto.replace(/^(?!#!)(\s*#.*$)/gm, "");
            }

            // Limpieza común: eliminar líneas en blanco excesivas
            return texto.split('\n')
                        .map(line => line.trimEnd())
                        .join('\n')
                        .replace(/\n{3,}/g, '\n\n')
                        .trim();
        }

        function downloadFile(content, fileName) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
        }

        processBtn.addEventListener('click', processZip);
    </script>
</body>
</html>
