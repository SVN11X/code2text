<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code2Text Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
        .container { border: 2px dashed #ccc; padding: 2rem; text-align: center; border-radius: 10px; }
        #status { margin-top: 1rem; color: #555; font-size: 0.9rem; white-space: pre-wrap; text-align: left; }
        button { background: #2ea44f; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Code2Text Converter</h2>
    <p>Sube un archivo .zip para consolidar tu código en un solo .txt optimizado para LLMs.</p>

    <div class="container">
        <input type="file" id="fileInput" accept=".zip">
        <br><br>
        <button id="processBtn" disabled>Procesar y Descargar</button>
    </div>

    <div id="status"></div>

    <script>
        (function() {
            "use strict";

            const fileInput = document.getElementById('fileInput');
            const processBtn = document.getElementById('processBtn');
            const statusDiv = document.getElementById('status');

            // Configuración
            const ALLOWED_EXTENSIONS = [
                ".py", ".xml", ".yaml", ".yml", ".xacro", ".cpp", ".cc", ".h", ".hpp", ".ino",
                ".msg", ".srv", ".action", ".urdf", ".world", ".sh", ".cfg", ".toml", ".txt", ".md"
            ];
            const EXCLUDE_DIRS = ["__pycache__", ".git", ".venv", "node_modules", "z_code_file"];

            fileInput.addEventListener('change', () => {
                processBtn.disabled = !fileInput.files.length;
            });

            async function processZip() {
                const file = fileInput.files[0];
                if (!file) return;

                statusDiv.textContent = "Leyendo archivo zip...";
                processBtn.disabled = true;

                try {
                    const zip = new JSZip();
                    const contents = await zip.loadAsync(file);
                    
                    let treeOutput = "src/\n";
                    let codeOutput = "<documentos_codigo>\n";
                    let fileCount = 0;

                    // Procesar entradas del zip
                    for (const [path, zipEntry] of Object.entries(contents.files)) {
                        if (zipEntry.dir) continue;

                        // Excluir directorios no deseados
                        const pathParts = path.split('/');
                        if (pathParts.some(part => EXCLUDE_DIRS.includes(part))) continue;

                        // Obtener extensión en minúsculas
                        const fileName = path.split('/').pop();
                        const extDotIndex = fileName.lastIndexOf('.');
                        const ext = extDotIndex >= 0 ? fileName.substring(extDotIndex).toLowerCase() : '';

                        // Agregar al árbol visual
                        treeOutput += `  ├─ ${path}\n`;

                        // Si es extensión permitida, procesar contenido
                        if (ALLOWED_EXTENSIONS.includes(ext)) {
                            try {
                                let text = await zipEntry.async("string");
                                const cleanText = limpiarCodigo(text, ext);

                                if (cleanText.trim()) {
                                    codeOutput += `  <archivo ruta="${path}" tipo="${ext}">\n`;
                                    codeOutput += cleanText;
                                    codeOutput += `\n  </archivo>\n`;
                                    fileCount++;
                                }
                            } catch (e) {
                                console.warn(`Error al procesar ${path}:`, e);
                                statusDiv.textContent += `\n⚠️ No se pudo leer ${path}`;
                            }
                        }
                    }

                    codeOutput += "</documentos_codigo>";

                    const finalResult = `<estructura_proyecto>\n${treeOutput}</estructura_proyecto>\n\n${codeOutput}`;
                    
                    downloadFile(finalResult, "000_output_full_code.txt");
                    statusDiv.innerHTML = `✅ ¡Listo! Procesados ${fileCount} archivos.`;
                } catch (err) {
                    console.error(err);
                    statusDiv.innerHTML = `<span class="error">❌ Error: ${err.message}</span>`;
                } finally {
                    processBtn.disabled = false;
                }
            }

            function limpiarCodigo(texto, extension) {
                // Eliminar comentarios según tipo de archivo
                
                // Python (.py)
                if (extension === ".py") {
                    // Líneas que son solo comentarios
                    texto = texto.replace(/^\s*#.*$/gm, "");
                    // Docstrings triples (simplificado, puede no capturar anidados pero funciona en mayoría de casos)
                    texto = texto.replace(/"{3}[\s\S]*?"{3}|'{3}[\s\S]*?'{3}/g, "");
                    // Comentarios al final de línea (sin lookbehind para mayor compatibilidad)
                    texto = texto.replace(/#[^"\n]*$/gm, "");
                }
                // C/C++/Arduino (.cpp, .cc, .h, .hpp, .ino)
                else if ([".cpp", ".cc", ".h", ".hpp", ".ino"].includes(extension)) {
                    texto = texto.replace(/\/\/.*$/gm, "");           // Comentarios de línea
                    texto = texto.replace(/\/\*[\s\S]*?\*\//g, "");   // Comentarios de bloque
                }
                // XML / XACRO / URDF / World
                else if ([".xml", ".xacro", ".urdf", ".world"].includes(extension)) {
                    texto = texto.replace(/<!--[\s\S]*?-->/g, "");    // Comentarios XML
                }
                // YAML / TOML / SH / CFG
                else if ([".yaml", ".yml", ".sh", ".toml", ".cfg"].includes(extension)) {
                    // Eliminar líneas de comentario que empiezan con #, excepto shebang (#!)
                    texto = texto.replace(/^(?!#!)(\s*#.*$)/gm, "");
                }
                // Para archivos .txt, .md no hacemos limpieza de comentarios

                // Limpieza común: quitar espacios al final de línea y reducir líneas vacías múltiples
                return texto.split('\n')
                            .map(line => line.trimEnd())
                            .join('\n')
                            .replace(/\n{3,}/g, '\n\n')
                            .trim();
            }

            function downloadFile(content, fileName) {
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            processBtn.addEventListener('click', processZip);
        })();
    </script>
</body>
</html>
